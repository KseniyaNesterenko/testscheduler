name: CI Test Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  schedule:
    runs-on: ubuntu-latest
    env:
      SCHEDULER_URL: ${{ secrets.SCHEDULER_URL }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Collect and Schedule Tests
        id: set-matrix
        run: |
          # 1. Собираем тесты 
          find src/test/java -name "*Test.java" | sed 's|.*java/||;s|/|.|g;s|.java||' | jq -R . | jq -s . > all_tests.json
          
          # 2. Запрос распределения
          curl -X POST "$SCHEDULER_URL/schedule?strategy=LPT_BALANCED" \
            -H "Content-Type: application/json" \
            -d "{\"testNames\": $(cat all_tests.json), \"containerCount\": 5, \"runId\": \"${{ github.run_id }}\"}" \
            > schedule.json
          
          cat schedule.json
          echo "matrix=$(jq -c . schedule.json)" >> $GITHUB_OUTPUT

      - name: Upload Schedule Artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedule-json
          path: schedule.json

  test:
    needs: schedule
    runs-on: ubuntu-latest

    env:
      DB_NAME: test_scheduler
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: test_scheduler
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
    strategy:
      matrix:
        node_index: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Schedule
        uses: actions/download-artifact@v4
        with:
          name: schedule-json

      - name: Run Allocated Tests
        run: |
          TESTS=$(jq -r ".containers[${{ matrix.node_index }}].tests | join(\",\")" schedule.json)

          echo "Node: ${{ matrix.node_index }}"
          echo "Tests: $TESTS"
          
          mvn test -Dtest=$TESTS \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/$DB_NAME \
            -Dspring.datasource.username=$DB_USERNAME \
            -Dspring.datasource.password=$DB_PASSWORD \
            -DfailIfNoTests=false

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.node_index }}
          path: target/surefire-reports/*.xml

  upload_reports:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Run Upload Script
        run: |
          chmod +x ./upload-to-scheduler.sh
          find all-reports -name "TEST-*.xml" -exec ./upload-to-scheduler.sh {} \;